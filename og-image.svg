<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a1226"/>
      <stop offset="1" stop-color="#0b1b3b"/>
    </linearGradient>
    <radialGradient id="glow1" cx="1000" cy="80" r="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2D8BFF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#2D8BFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="100" cy="600" r="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00D4B4" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#00D4B4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2D8BFF"/>
      <stop offset="1" stop-color="#00D4B4"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2D8BFF"/>
      <stop offset="1" stop-color="#00D4B4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Brand -->
  <g transform="translate(80, 80)">
    <rect width="56" height="56" rx="14" fill="url(#mark)"/>
    <path d="M16 38l7-7 5 5 14-14" stroke="#fff" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="44" cy="22" r="3" fill="#fff"/>
    <text x="76" y="40" font-family="Inter, -apple-system, Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#e7eefc">
      CALCCOMEX <tspan fill="#00D4B4">IA</tspan>
    </text>
  </g>

  <!-- Eyebrow pill -->
  <g transform="translate(80, 210)">
    <rect width="260" height="42" rx="21" fill="rgba(0,212,180,0.10)" stroke="rgba(0,212,180,0.40)"/>
    <text x="24" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="600" letter-spacing="3" fill="#00D4B4">
      INTELIGÊNCIA ARTIFICIAL
    </text>
  </g>

  <!-- Headline (3 lines, large) -->
  <text x="80" y="340" font-family="Inter, -apple-system, Segoe UI, sans-serif" font-size="76" font-weight="800" fill="#e7eefc" letter-spacing="-2">
    Custo total
  </text>
  <text x="80" y="420" font-family="Inter, sans-serif" font-size="76" font-weight="800" fill="#e7eefc" letter-spacing="-2">
    de importação
  </text>
  <text x="80" y="500" font-family="Inter, sans-serif" font-size="76" font-weight="800" letter-spacing="-2">
    <tspan fill="#e7eefc">em </tspan><tspan fill="url(#grad)">segundos</tspan><tspan fill="#e7eefc">.</tspan>
  </text>

  <!-- Bullets row -->
  <g transform="translate(80, 562)" font-family="Inter, sans-serif" font-size="17" fill="#a9b7d6">
    <circle cx="7" cy="-6" r="5" fill="#00D4B4"/>
    <text x="24" y="0">NCM automático</text>
    <circle cx="222" cy="-6" r="5" fill="#00D4B4"/>
    <text x="239" y="0">Impostos completos</text>
    <circle cx="476" cy="-6" r="5" fill="#00D4B4"/>
    <text x="493" y="0">Landed cost em BRL</text>
  </g>
</svg>
